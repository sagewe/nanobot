<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pikachu control room</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="sidebar-backdrop"></div>
    <main id="app">
      <aside class="session-rail">
          <div class="tab-bar" role="tablist">
            <div class="tab-bar-header">
              <h1 class="sidebar-title" data-i18n="app_name">Pikachu</h1>
              <button id="sidebar-toggle" data-i18n-title="toggle_sidebar" title="Toggle sidebar">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
              </button>
            </div>
            <button class="tab-btn" data-tab="chat" data-active="true" role="tab">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <span class="tab-label" data-i18n="tab_chat">Chat</span>
            </button>
            <button class="tab-btn" data-tab="sessions" role="tab">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              <span class="tab-label" data-i18n="tab_sessions">Sessions</span>
            </button>
            <button class="tab-btn" data-tab="channels" role="tab">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
              <span class="tab-label" data-i18n="tab_channels">Channels</span>
            </button>
            <button class="tab-btn" data-tab="jobs" role="tab">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <span class="tab-label" data-i18n="tab_jobs">Jobs</span>
            </button>
          </div>
          <div class="sidebar-footer">
            <button id="theme-toggle" data-i18n-title="toggle_theme" title="Toggle theme">
              <svg id="theme-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
            <button id="wide-toggle" title="Wide layout">
              <svg id="wide-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"></svg>
            </button>
            <button id="lang-toggle">En</button>
          </div>
        </aside>
        <section class="shell">
        <section class="sessions-pane" hidden>
          <div class="sessions-search-bar">
            <input type="search" id="sessions-search" data-i18n-placeholder="sessions_search_placeholder" placeholder="Filter sessions…" autocomplete="off" />
          </div>
          <div id="sessions-list" class="sessions-list"></div>
        </section>
        <section class="jobs-pane" hidden>
          <div class="jobs-header">
            <h2 class="jobs-title" data-i18n="jobs_title">Scheduled Jobs</h2>
            <button id="jobs-refresh-btn" type="button" data-i18n-title="jobs_refresh" title="Refresh">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            </button>
          </div>
          <div id="jobs-list" class="jobs-list"></div>
          <details class="jobs-add-form">
            <summary data-i18n="jobs_add">Add Job</summary>
            <form id="add-job-form">
              <label>
                <span data-i18n="jobs_message">Message</span>
                <textarea id="job-message" rows="2" required></textarea>
              </label>
              <label>
                <span data-i18n="jobs_schedule_type">Schedule type</span>
                <select id="job-schedule-type">
                  <option value="every" data-i18n="jobs_schedule_every">Every N seconds</option>
                  <option value="cron" data-i18n="jobs_schedule_cron">Cron expression</option>
                  <option value="at" data-i18n="jobs_schedule_at">One-time (at datetime)</option>
                </select>
              </label>
              <label id="job-every-label">
                <span data-i18n="jobs_every_seconds">Interval (seconds)</span>
                <input type="number" id="job-every-seconds" min="1" value="3600" />
              </label>
              <label id="job-cron-label" hidden>
                <span data-i18n="jobs_cron_expr">Cron expression</span>
                <input type="text" id="job-cron-expr" placeholder="0 9 * * *" />
              </label>
              <label id="job-tz-label" hidden>
                <span data-i18n="jobs_tz">Timezone (optional)</span>
                <input type="text" id="job-tz" placeholder="America/Vancouver" />
              </label>
              <label id="job-at-label" hidden>
                <span data-i18n="jobs_at">Date/time (ISO)</span>
                <input type="text" id="job-at" placeholder="2026-01-01T09:00:00" />
              </label>
              <button type="submit" data-i18n="jobs_add_submit">Add Job</button>
            </form>
          </details>
        </section>
        <section class="channels-pane" hidden>
          <section id="weixin-account-panel" class="account-panel">
            <div class="account-panel-header">
              <div class="session-kicker" data-i18n="weixin">Weixin</div>
              <div class="account-actions">
                <button id="weixin-login-button" type="button" data-i18n-title="login_to_weixin" title="Login to Weixin">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                </button>
                <button id="weixin-logout-button" type="button" data-i18n-title="logout" title="Logout">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
              </div>
            </div>
            <div class="account-panel-info">
              <div class="account-status">
                <strong id="weixin-status-label" data-i18n="checking_account">Checking account…</strong>
                <span id="weixin-user-label" data-i18n="login_from_console">Login from the embedded console.</span>
              </div>
            </div>
            <div id="weixin-qr-panel" hidden>
              <img id="weixin-qr-image" data-i18n-alt="weixin_qr_alt" alt="Weixin login QR code" />
              <div id="weixin-qr-note" class="account-muted" data-i18n="scan_to_confirm">Scan in Weixin to confirm login.</div>
            </div>
          </section>
        </section>
        <section class="conversation-pane">
          <div class="session-header">
            <button id="mobile-menu-btn" aria-label="Open sidebar">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <select id="session-select" data-i18n-aria-label="select_session" aria-label="Select session" style="display:none"></select>
          </div>
          <div id="transcript-search" hidden>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input id="search-input" type="text" autocomplete="off" spellcheck="false" data-i18n-placeholder="search_placeholder">
            <span id="search-count"></span>
            <button id="search-prev" type="button" aria-label="Previous match"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg></button>
            <button id="search-next" type="button" aria-label="Next match"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
            <button id="search-close" type="button" aria-label="Close search"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
          </div>
          <section id="transcript" aria-live="polite"></section>
          <div id="status" role="status"></div>
          <form id="composer">
            <div id="slash-menu" hidden>
              <div id="slash-menu-list" role="listbox" aria-label="Slash commands"></div>
            </div>
            <div class="composer-card">
              <textarea id="message-input" rows="1" data-i18n-placeholder="input_placeholder" placeholder="Ask Pikachu to inspect, edit, or research. (Enter to send, Ctrl+Enter for newline)"></textarea>
              <div class="composer-toolbar">
                <div class="composer-toolbar-left">
                  <button id="export-button" type="button" data-i18n-title="export_conversation" title="Export">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  </button>
                  <button id="duplicate-session-button" type="button" data-i18n="duplicate_to_web" hidden>Duplicate to Web</button>
                </div>
                <div class="composer-toolbar-right">
                  <button id="profile-picker-btn" type="button" class="profile-picker-btn" aria-haspopup="listbox">
                    <span id="profile-picker-label">–</span>
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                  </button>
                  <button id="send-button" type="submit" data-i18n-title="send_button" title="Send (Enter)">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                  </button>
                </div>
              </div>
            </div>
          </form>
        </section>
      </section>
    </main>
    <div id="profile-picker-menu" class="profile-picker-menu" role="listbox" hidden></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
